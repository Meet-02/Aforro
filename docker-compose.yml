version: '3.9'

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB:       aforro
      POSTGRES_USER:     aforro
      POSTGRES_PASSWORD: aforro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DB_HOST:     db
      DB_NAME:     aforro
      DB_USER:     aforro
      DB_PASSWORD: aforro
      REDIS_URL:   redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      DB_HOST:     db
      DB_NAME:     aforro
      DB_USER:     aforro
      DB_PASSWORD: aforro
      REDIS_URL:   redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data: